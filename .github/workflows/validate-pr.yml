name: Validate PR

on:
  pull_request:
    paths:
      - "records/**"
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Get changed files
        id: changes
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          ADDED=$(git diff --name-status --diff-filter=A $BASE_SHA HEAD -- 'records/**.json' | cut -f2 | grep -v schema.json | tr '\n' ' ')
          MODIFIED=$(git diff --name-status --diff-filter=M $BASE_SHA HEAD -- 'records/**.json' | cut -f2 | grep -v schema.json | tr '\n' ' ')
          DELETED=$(git diff --name-status --diff-filter=D $BASE_SHA HEAD -- 'records/**.json' | cut -f2 | grep -v schema.json | tr '\n' ' ')
          COMMIT_EMAILS=$(git log $BASE_SHA..HEAD --format=%ae | sort -u | tr '\n' ' ')
          echo "added=$ADDED" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "deleted=$DELETED" >> $GITHUB_OUTPUT
          echo "commit_emails=$COMMIT_EMAILS" >> $GITHUB_OUTPUT

      - name: Compile validation script
        run: npx tsc -p .github/scripts/tsconfig.json

      - name: Run validation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          ADDED_FILES: ${{ steps.changes.outputs.added }}
          MODIFIED_FILES: ${{ steps.changes.outputs.modified }}
          DELETED_FILES: ${{ steps.changes.outputs.deleted }}
          COMMIT_EMAILS: ${{ steps.changes.outputs.commit_emails }}
        run: node .github/scripts/validate-pr.js

      - name: Enable auto-merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
