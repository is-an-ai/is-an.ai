name: Deploy DNS Records (Incremental)

on:
  # main 브랜치에 records 파일이 변경되면 자동 실행 (증분 업데이트)
  push:
    branches:
      - main
    paths:
      - "records/**.json"
  # 수동 실행도 가능
  workflow_dispatch:
    inputs:
      full_sync:
        description: "전체 동기화 (sync-pdns-dns) - 증분 업데이트 대신 저장소 전체를 PowerDNS에 반영"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # push 시 before/after diff를 위해 전체 히스토리 필요 (multi-commit push 대응)
          fetch-depth: ${{ github.event_name == 'push' && '0' || '2' }}

      - name: Identify Changes
        id: changes
        if: ${{ github.event.inputs.full_sync != 'true' }}
        run: |
          git checkout ${{ github.ref_name }}

          # push: before→after 전체 diff (multi-commit push 시 누락 방지)
          # workflow_dispatch: 마지막 커밋의 변경분
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "00000000000000000000000000000000000000000000" ]; then
            DIFF_FROM="${{ github.event.before }}"
            DIFF_TO="${{ github.event.after }}"
            echo "Using push diff: $DIFF_FROM..$DIFF_TO"
          else
            DIFF_FROM="HEAD^"
            DIFF_TO="HEAD"
            echo "Using HEAD^..HEAD diff"
          fi

          ADDED_FILES=$(git diff --name-status --diff-filter=A "$DIFF_FROM" "$DIFF_TO" -- 'records/**.json' | cut -f2 | tr '\n' ' ')
          MODIFIED_FILES=$(git diff --name-status --diff-filter=M "$DIFF_FROM" "$DIFF_TO" -- 'records/**.json' | cut -f2 | tr '\n' ' ')
          DELETED_FILES=$(git diff --name-status --diff-filter=D "$DIFF_FROM" "$DIFF_TO" -- 'records/**.json' | cut -f2 | tr '\n' ' ')

          echo "Added: $ADDED_FILES"
          echo "Modified: $MODIFIED_FILES"
          echo "Deleted: $DELETED_FILES"

          echo "added_files=$ADDED_FILES" >> $GITHUB_OUTPUT
          echo "modified_files=$MODIFIED_FILES" >> $GITHUB_OUTPUT
          echo "deleted_files=$DELETED_FILES" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm install axios typescript

      - name: Compile TypeScript
        run: npx tsc -p .github/scripts/tsconfig.json

      - name: Update DNS via PowerDNS API (Incremental)
        if: ${{ github.event.inputs.full_sync != 'true' }}
        env:
          PDNS_API_KEY: ${{ secrets.PDNS_API_KEY }}
          PDNS_API_URL: http://pdns-auth:8081
          PDNS_ZONE: ${{ secrets.PDNS_ZONE }}
          ADDED_FILES: ${{ steps.changes.outputs.added_files }}
          MODIFIED_FILES: ${{ steps.changes.outputs.modified_files }}
          DELETED_FILES: ${{ steps.changes.outputs.deleted_files }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: node .github/scripts/update-pdns-dns.js
        timeout-minutes: 5

      - name: Sync DNS Records (Full Sync)
        if: ${{ github.event.inputs.full_sync == 'true' }}
        env:
          PDNS_API_KEY: ${{ secrets.PDNS_API_KEY }}
          PDNS_API_URL: http://pdns-auth:8081
          PDNS_ZONE: ${{ secrets.PDNS_ZONE }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          DRY_RUN: "false"
          NODE_OPTIONS: "--max-old-space-size=512"
        run: node .github/scripts/sync-pdns-dns.js
        timeout-minutes: 10
